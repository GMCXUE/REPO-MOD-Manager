name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "REPO_MOD_Manager" repo_mod_manager.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: REPO_MOD_Manager
          path: dist\REPO_MOD_Manager.exe
